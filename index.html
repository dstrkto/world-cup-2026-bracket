<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026 World Cup — Radial Knockout Bracket</title>
<style>
  :root{
    --bg:#141412; --surface:#26261f; --line:#3a392f; --line2:#52503f;
    --text:#f0efe9; --muted:#a3a096; --accent:#e0a44e; --accentbg:#3a2e17; --win:#52c98a;
    --empty:#222220; --ringline:#141412;
  }
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{margin:0 auto;padding:16px;}
  .layout{display:grid;grid-template-columns:minmax(170px,230px) 1fr minmax(170px,230px);gap:14px;align-items:center;}
  .layout svg{max-height:calc(100vh - 150px);max-width:100%;width:auto;height:auto;margin:0 auto;}
  .gcol{display:flex;flex-direction:column;gap:10px;}
  .gp{background:var(--surface);border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .gp h3{margin:0;padding:4px 8px;font-size:11px;font-weight:700;letter-spacing:.6px;
    background:var(--accentbg);color:var(--accent);border-bottom:1px solid var(--line);}
  .gp table{width:100%;border-collapse:collapse;font-size:11px;}
  .gp td{padding:2.5px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gp td.pts{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;}
  .gp tr.adv td{color:var(--text);font-weight:600;}
  .gp tr.out td{color:var(--muted);opacity:.7;}
  @media (max-width:900px){
    .layout{grid-template-columns:1fr;}
    .gcol{flex-direction:row;flex-wrap:wrap;}
    .gp{flex:1 1 150px;}
  }
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
  h1{font-size:18px;font-weight:600;margin:0;}
  .meta{font-size:12px;color:var(--muted);}
  .legend{font-size:12px;color:var(--muted);margin:2px 0 6px;}
  svg{width:100%;height:auto;display:block;}
  .seg{stroke:var(--ringline);stroke-width:2;}
  .seg-empty{fill:var(--empty);}
  .seg-loser{opacity:.45;}
  .fl{font-size:20px;}
  .fl-sm{font-size:16px;}
  .fimg{width:16px;height:12px;object-fit:cover;border-radius:2px;vertical-align:-1px;}
  .code{fill:var(--text);font-size:10px;font-weight:600;letter-spacing:.4px;}
  .slot{fill:var(--muted);font-size:9px;}
  .sc{fill:var(--text);font-size:11px;font-weight:700;}
  .mnum{fill:var(--muted);font-size:8px;}
  .ti{fill:var(--text);font-size:14px;font-weight:700;}
  .ts{fill:var(--muted);font-size:9px;}
  .champ-fl{font-size:30px;}
  .ctr{fill:var(--surface);stroke:var(--line2);stroke-width:1.5;}
  .ctr-champ{fill:var(--accentbg);stroke:var(--accent);stroke-width:2;}
  .quals{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:2px 0 12px;font-size:12px;}
  .quals .lbl{color:var(--muted);margin-right:2px;}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border:1px solid var(--line2);border-radius:999px;background:var(--surface);color:var(--text);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>2026 FIFA World Cup — road to the final</h1>
    <span class="meta" id="updated"></span>
  </header>
  <div class="legend">Outer ring → centre: Round of 32 · Round of 16 · Quarter-finals · Semi-finals · Final. Winners advance inward; losers fade. Champion at the centre.</div>
  <div class="quals" id="quals"></div>
  <div class="layout">
    <div class="gcol" id="gleft"></div>
    <svg id="bracket" viewBox="0 0 900 900" role="img" aria-label="Radial knockout bracket for the 2026 FIFA World Cup"></svg>
    <div class="gcol" id="gright"></div>
  </div>
</div>
<script>
const CX=450, CY=450;
// ring bands, outer → inner: [outer radius, inner radius]
const BAND={R32:[443,373], R16:[373,303], QF:[303,233], SF:[233,163], F:[163,96]};
const CTR=88; // champion circle
const ORDER=[73,75,74,77,83,84,81,82,76,78,79,80,86,88,85,87];
const META={
 73:{rd:'R32',d:'Jun 28',v:'Los Angeles',sl:['RU A','RU B']},
 74:{rd:'R32',d:'Jun 29',v:'Boston',sl:['W E','3rd']},
 75:{rd:'R32',d:'Jun 29',v:'Guadalajara',sl:['W F','RU C']},
 76:{rd:'R32',d:'Jun 29',v:'Houston',sl:['W C','RU F']},
 77:{rd:'R32',d:'Jun 30',v:'New York NJ',sl:['W I','3rd']},
 78:{rd:'R32',d:'Jun 30',v:'Dallas',sl:['RU E','RU I']},
 79:{rd:'R32',d:'Jun 30',v:'Mexico City',sl:['W A','3rd']},
 80:{rd:'R32',d:'Jul 1',v:'Atlanta',sl:['W L','3rd']},
 81:{rd:'R32',d:'Jul 1',v:'San Francisco',sl:['W D','3rd']},
 82:{rd:'R32',d:'Jul 1',v:'Seattle',sl:['W G','3rd']},
 83:{rd:'R32',d:'Jul 2',v:'Toronto',sl:['RU K','RU L']},
 84:{rd:'R32',d:'Jul 2',v:'Los Angeles',sl:['W H','RU J']},
 85:{rd:'R32',d:'Jul 2',v:'Vancouver',sl:['W B','3rd']},
 86:{rd:'R32',d:'Jul 3',v:'Miami',sl:['W J','RU H']},
 87:{rd:'R32',d:'Jul 3',v:'Kansas City',sl:['W K','3rd']},
 88:{rd:'R32',d:'Jul 3',v:'Dallas',sl:['RU D','RU G']},
 89:{rd:'R16',d:'Jul 4',v:'Philadelphia',f:[74,77]},
 90:{rd:'R16',d:'Jul 4',v:'Houston',f:[73,75]},
 91:{rd:'R16',d:'Jul 5',v:'New York NJ',f:[76,78]},
 92:{rd:'R16',d:'Jul 5',v:'Mexico City',f:[79,80]},
 93:{rd:'R16',d:'Jul 6',v:'Dallas',f:[83,84]},
 94:{rd:'R16',d:'Jul 6',v:'Seattle',f:[81,82]},
 95:{rd:'R16',d:'Jul 7',v:'Atlanta',f:[86,88]},
 96:{rd:'R16',d:'Jul 7',v:'Vancouver',f:[85,87]},
 97:{rd:'QF',d:'Jul 9',v:'Boston',f:[89,90]},
 98:{rd:'QF',d:'Jul 10',v:'Los Angeles',f:[93,94]},
 99:{rd:'QF',d:'Jul 11',v:'Miami',f:[91,92]},
 100:{rd:'QF',d:'Jul 11',v:'Kansas City',f:[95,96]},
 101:{rd:'SF',d:'Jul 14',v:'Dallas',f:[97,98]},
 102:{rd:'SF',d:'Jul 15',v:'Atlanta',f:[99,100]},
 104:{rd:'F',d:'Jul 19',v:'New York NJ',f:[101,102]}
};
const FLAG={"Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czechia":"🇨🇿","Canada":"🇨🇦","Bosnia and Herzegovina":"🇧🇦","Qatar":"🇶🇦","Switzerland":"🇨🇭","Brazil":"🇧🇷","Morocco":"🇲🇦","Haiti":"🇭🇹","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","USA":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Türkiye":"🇹🇷","Germany":"🇩🇪","Curaçao":"🇨🇼","Ivory Coast":"🇨🇮","Ecuador":"🇪🇨","Netherlands":"🇳🇱","Japan":"🇯🇵","Sweden":"🇸🇪","Tunisia":"🇹🇳","Belgium":"🇧🇪","Egypt":"🇪🇬","Iran":"🇮🇷","New Zealand":"🇳🇿","Spain":"🇪🇸","Cape Verde":"🇨🇻","Saudi Arabia":"🇸🇦","Uruguay":"🇺🇾","France":"🇫🇷","Senegal":"🇸🇳","Iraq":"🇮🇶","Norway":"🇳🇴","Argentina":"🇦🇷","Algeria":"🇩🇿","Austria":"🇦🇹","Jordan":"🇯🇴","Portugal":"🇵🇹","DR Congo":"🇨🇩","Uzbekistan":"🇺🇿","Colombia":"🇨🇴","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croatia":"🇭🇷","Ghana":"🇬🇭","Panama":"🇵🇦"};
const ABBR={"Mexico":"MEX","South Africa":"RSA","South Korea":"KOR","Czechia":"CZE","Canada":"CAN","Bosnia and Herzegovina":"BIH","Qatar":"QAT","Switzerland":"SUI","Brazil":"BRA","Morocco":"MAR","Haiti":"HAI","Scotland":"SCO","USA":"USA","Paraguay":"PAR","Australia":"AUS","Türkiye":"TUR","Germany":"GER","Curaçao":"CUW","Ivory Coast":"CIV","Ecuador":"ECU","Netherlands":"NED","Japan":"JPN","Sweden":"SWE","Tunisia":"TUN","Belgium":"BEL","Egypt":"EGY","Iran":"IRN","New Zealand":"NZL","Spain":"ESP","Cape Verde":"CPV","Saudi Arabia":"KSA","Uruguay":"URU","France":"FRA","Senegal":"SEN","Iraq":"IRQ","Norway":"NOR","Argentina":"ARG","Algeria":"ALG","Austria":"AUT","Jordan":"JOR","Portugal":"POR","DR Congo":"COD","Uzbekistan":"UZB","Colombia":"COL","England":"ENG","Croatia":"CRO","Ghana":"GHA","Panama":"PAN"};
const CODE={"Mexico":"mx","South Africa":"za","South Korea":"kr","Czechia":"cz","Canada":"ca","Bosnia and Herzegovina":"ba","Qatar":"qa","Switzerland":"ch","Brazil":"br","Morocco":"ma","Haiti":"ht","Scotland":"gb-sct","USA":"us","Paraguay":"py","Australia":"au","Türkiye":"tr","Germany":"de","Curaçao":"cw","Ivory Coast":"ci","Ecuador":"ec","Netherlands":"nl","Japan":"jp","Sweden":"se","Tunisia":"tn","Belgium":"be","Egypt":"eg","Iran":"ir","New Zealand":"nz","Spain":"es","Cape Verde":"cv","Saudi Arabia":"sa","Uruguay":"uy","France":"fr","Senegal":"sn","Iraq":"iq","Norway":"no","Argentina":"ar","Algeria":"dz","Austria":"at","Jordan":"jo","Portugal":"pt","DR Congo":"cd","Uzbekistan":"uz","Colombia":"co","England":"gb-eng","Croatia":"hr","Ghana":"gh","Panama":"pa"};
// primary national colors for wedge fills
const COLOR={"Mexico":"#046a38","South Africa":"#007749","South Korea":"#cd2e3a","Czechia":"#d7141a","Canada":"#d80621","Bosnia and Herzegovina":"#002f6c","Qatar":"#8a1538","Switzerland":"#d52b1e","Brazil":"#ffdf00","Morocco":"#c1272d","Haiti":"#00209f","Scotland":"#005eb8","USA":"#3c3b6e","Paraguay":"#d52b1e","Australia":"#ffcd00","Türkiye":"#e30a17","Germany":"#000000","Curaçao":"#002b7f","Ivory Coast":"#f77f00","Ecuador":"#ffdd00","Netherlands":"#ff7f00","Japan":"#003580","Sweden":"#ffcd00","Tunisia":"#e70013","Belgium":"#ed2939","Egypt":"#ce1126","Iran":"#239f40","New Zealand":"#000000","Spain":"#aa151b","Cape Verde":"#003893","Saudi Arabia":"#006c35","Uruguay":"#7bafd4","France":"#002395","Senegal":"#00853f","Iraq":"#007a3d","Norway":"#ba0c2f","Argentina":"#75aadb","Algeria":"#006233","Austria":"#ed2939","Jordan":"#007a3d","Portugal":"#046a38","DR Congo":"#007fff","Uzbekistan":"#0099b5","Colombia":"#fcd116","England":"#cf081f","Croatia":"#ff0000","Ghana":"#fcd116","Panama":"#da121a"};
// final group-stage records [team, W, D, L, GF, GA]
const GROUPS={
 A:[["Mexico",3,0,0,6,0],["South Africa",1,1,1,2,3],["South Korea",1,0,2,2,3],["Czechia",0,1,2,2,6]],
 B:[["Switzerland",2,1,0,7,3],["Canada",1,1,1,8,3],["Bosnia and Herzegovina",1,1,1,5,6],["Qatar",0,1,2,2,10]],
 C:[["Brazil",2,1,0,7,1],["Morocco",2,1,0,6,3],["Scotland",1,0,2,1,4],["Haiti",0,0,3,2,8]],
 D:[["USA",2,0,1,8,4],["Australia",1,1,1,2,2],["Paraguay",1,1,1,2,4],["Türkiye",1,0,2,3,5]],
 E:[["Germany",2,0,1,10,4],["Ivory Coast",2,0,1,4,2],["Ecuador",1,1,1,2,2],["Curaçao",0,1,2,1,9]],
 F:[["Netherlands",2,1,0,10,4],["Japan",1,2,0,7,3],["Sweden",1,1,1,7,7],["Tunisia",0,0,3,2,12]],
 G:[["Belgium",1,2,0,6,2],["Egypt",1,2,0,5,3],["Iran",0,3,0,3,3],["New Zealand",0,1,2,4,10]],
 H:[["Spain",2,1,0,5,0],["Cape Verde",0,3,0,2,3],["Uruguay",0,2,1,3,4],["Saudi Arabia",0,2,1,1,5]],
 I:[["France",3,0,0,10,2],["Norway",2,0,1,8,7],["Senegal",1,0,2,8,6],["Iraq",0,0,3,1,12]],
 J:[["Argentina",3,0,0,8,1],["Austria",1,1,1,6,5],["Algeria",1,1,1,5,7],["Jordan",0,0,3,3,8]],
 K:[["Colombia",2,1,0,4,1],["Portugal",1,2,0,6,1],["DR Congo",1,1,1,4,3],["Uzbekistan",0,0,3,2,11]],
 L:[["England",2,1,0,6,2],["Croatia",2,0,1,5,5],["Ghana",1,1,1,2,2],["Panama",0,0,3,0,4]]
};
const D2R=Math.PI/180;
const pt=(r,a)=>[CX+r*Math.cos(a), CY+r*Math.sin(a)];
// angular spans: R32 match i covers 22.5°, centred like the old layout
const SPAN={};
ORDER.forEach((m,i)=>{const a0=(-90-11.25+i*22.5)*D2R; SPAN[m]=[a0, a0+22.5*D2R];});
[89,90,91,92,93,94,95,96,97,98,99,100,101,102,104].forEach(m=>{
  const f=META[m].f, s0=SPAN[f[0]], s1=SPAN[f[1]];
  SPAN[m]=[Math.min(s0[0],s1[0]), Math.max(s0[1],s1[1])];
});
const NS="http://www.w3.org/2000/svg";
const el=(n,a)=>{const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;};
function txt(p,cls,s,opt={}){const t=el("text",{x:p[0],y:p[1],class:cls,"text-anchor":opt.anchor||"middle","dominant-baseline":opt.vb||"middle"});t.textContent=s;return t;}
function sector(r1,r0,a0,a1){ // annular sector path, r1=outer r0=inner
  const large=(a1-a0)>Math.PI?1:0;
  const [x1,y1]=pt(r1,a0),[x2,y2]=pt(r1,a1),[x3,y3]=pt(r0,a1),[x4,y4]=pt(r0,a0);
  return "M"+x1+" "+y1+" A"+r1+" "+r1+" 0 "+large+" 1 "+x2+" "+y2+
         " L"+x3+" "+y3+" A"+r0+" "+r0+" 0 "+large+" 0 "+x4+" "+y4+" Z";
}
function teamInfo(data,m,k){
  const d=data&&data.m?data.m[m]:null, meta=META[m];
  const tn=d?d[k==1?'t1':'t2']:null;
  if(tn) return {name:tn, known:true};
  if(meta.sl) return {name:meta.sl[k-1], known:false};
  return {name:'W'+meta.f[k-1], known:false};
}
function score(data,m,k){
  const d=data&&data.m?data.m[m]:null;
  if(!d||!d.s) return null;
  const s=String(d.s);
  const g=s.match(/^\s*(\d+)\s*-\s*(\d+)/);      // regulation score "a-b"
  if(!g) return null;
  const p=s.match(/\(\s*(\d+)\s*-\s*(\d+)/);     // optional pens "(x-y p)"
  return g[k]+(p?" ("+p[k]+")":"");
}
function winner(data,m){const d=data&&data.m?data.m[m]:null;return d?d.w:null;}
function renderGroups(data){
  // teams that actually reached the R32 (top 2 + advancing 3rds), from bracket.json
  const adv=new Set();
  if(data&&data.m)ORDER.forEach(m=>{const d=data.m[m];if(d){if(d.t1)adv.add(d.t1);if(d.t2)adv.add(d.t2);}});
  ((data&&data.qualified)||[]).forEach(n=>adv.add(n));
  const letters=Object.keys(GROUPS);
  const html=g=>{
    const rows=GROUPS[g].map(r=>{
      const [t,w,d,l,gf,ga]=r, pts=w*3+d;
      const cls=adv.size?(adv.has(t)?"adv":"out"):"";
      const fimg=CODE[t]?'<img class="fimg" src="flags/'+CODE[t]+'.svg" alt="">':'';
      return '<tr class="'+cls+'"><td>'+fimg+' '+(ABBR[t]||t)+'</td><td class="pts">'+pts+'</td></tr>';
    }).join('');
    return '<div class="gp"><h3>GROUP '+g+'</h3><table>'+rows+'</table></div>';
  };
  document.getElementById('gleft').innerHTML=letters.slice(0,6).map(html).join('');
  document.getElementById('gright').innerHTML=letters.slice(6).map(html).join('');
}
function draw(data){
  renderGroups(data);
  const svg=document.getElementById('bracket');
  svg.innerHTML='';
  const rounds=[
    {ms:ORDER, band:BAND.R32, outer:true},
    {ms:[90,89,93,94,91,92,95,96].sort((a,b)=>SPAN[a][0]-SPAN[b][0]), band:BAND.R16},
    {ms:[97,98,99,100].sort((a,b)=>SPAN[a][0]-SPAN[b][0]), band:BAND.QF},
    {ms:[101,102].sort((a,b)=>SPAN[a][0]-SPAN[b][0]), band:BAND.SF},
    {ms:[104], band:BAND.F}
  ];
  rounds.forEach(rd=>{
    rd.ms.forEach(m=>{
      const [A0,A1]=SPAN[m], mid=(A0+A1)/2, w=winner(data,m);
      [1,2].forEach(k=>{
        const f=META[m].f;
        const a0=f?SPAN[f[k-1]][0]:(k==1?A0:mid), a1=f?SPAN[f[k-1]][1]:(k==1?mid:A1);
        const t=teamInfo(data,m,k), sc=score(data,m,k);
        const p=el("path",{d:sector(rd.band[0],rd.band[1],a0,a1),
          class:"seg"+(t.known?(w&&w!=k?" seg-loser":""):" seg-empty")});
        if(t.known) p.setAttribute("fill",COLOR[t.name]||"var(--surface)");
        const title=el("title",{});
        title.textContent="M"+m+" · "+META[m].d+" · "+META[m].v+(t.known?(" — "+t.name+(sc?" ("+sc+")":"")):" — "+t.name);
        p.appendChild(title);
        svg.appendChild(p);
        // content at mid-angle of the sub-wedge, mid radius
        const ca=(a0+a1)/2, rm=(rd.band[0]+rd.band[1])/2;
        if(t.known){
          const big=rd.band[0]-rd.band[1]>68, fw=big?24:20, fh=big?18:15;
          const [fx,fy]=pt(rm+8,ca);
          if(CODE[t.name]) svg.appendChild(el("image",{href:"flags/"+CODE[t.name]+".svg",x:fx-fw/2,y:fy-fh/2,width:fw,height:fh,preserveAspectRatio:"xMidYMid slice"}));
          const lbl=ABBR[t.name]||t.name;
          const lt=txt(pt(rm-14,ca),"code",lbl+(sc!==null?" "+sc:""));
          lt.setAttribute("fill","#ffffff");
          lt.setAttribute("style","paint-order:stroke;stroke:rgba(0,0,0,.55);stroke-width:2.5px;");
          svg.appendChild(lt);
        } else {
          svg.appendChild(txt(pt(rm,ca),"slot",t.name));
        }
      });
      if(rd.outer){ // tiny match number just outside the outer ring
        svg.appendChild(txt(pt(rd.band[0]+9,mid),"mnum","M"+m));
      }
    });
  });
  // centre: champion or final info
  const champ=data&&data.champion?data.champion:null;
  svg.appendChild(el("circle",{cx:CX,cy:CY,r:CTR,class:champ?"ctr-champ":"ctr"}));
  if(champ){
    if(CODE[champ]) svg.appendChild(el("image",{href:"flags/"+CODE[champ]+".svg",x:CX-24,y:CY-42,width:48,height:36,preserveAspectRatio:"xMidYMid slice"}));
    svg.appendChild(txt([CX,CY+14],"ti",champ));
    svg.appendChild(txt([CX,CY+32],"ts","CHAMPION"));
  } else {
    svg.appendChild(txt([CX,CY-14],"ti","Final"));
    svg.appendChild(txt([CX,CY+6],"ts","Jul 19"));
    svg.appendChild(txt([CX,CY+20],"ts","New York NJ"));
  }
  const u=document.getElementById('updated');
  u.textContent=(data&&data.updated?("Updated "+data.updated):"")+(data&&data.note?(" · "+data.note):"");
  const q=document.getElementById('quals');
  const qt=(data&&data.qualified)||[];
  q.innerHTML=qt.length?('<span class="lbl">Through to the R32:</span>'+qt.map(n=>'<span class="chip">'+(CODE[n]?'<img class="fimg" src="flags/'+CODE[n]+'.svg" alt="">':'')+' '+n+'</span>').join('')):'';
}
fetch('bracket.json?cb='+Date.now()).then(r=>r.json()).then(draw).catch(()=>draw(null));
</script>
</body>
</html>
